<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moms World | Online Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .moms-pink { color: #e91e63; }
        .bg-moms-pink { background-color: #e91e63; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-32 text-slate-800 font-sans">

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/v4m0fL7/moms-logo.png" alt="Moms World Logo" class="h-10 w-auto">
                <span class="font-black text-lg tracking-tight uppercase hidden">Moms World</span>
            </div>
            <div id="status-badge" class="text-[10px] font-bold uppercase bg-pink-50 text-pink-600 px-3 py-1 rounded-full border border-pink-100">
                <span class="inline-block w-2 h-2 bg-pink-500 rounded-full animate-pulse mr-1"></span> Live
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="flex bg-slate-200 p-1 rounded-2xl">
            <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm transition-all">Inventory</button>
            <button onclick="switchTab('store')" id="tab-store" class="flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500 transition-all">Customer Store</button>
        </div>

        <div id="view-admin" class="space-y-6">
            <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-plus-circle moms-pink"></i> Create Product
                </h2>
                <div class="space-y-4">
                    <input type="text" id="p-name" placeholder="Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
                    <div class="flex gap-3">
                        <input type="number" id="p-price" placeholder="Price" class="w-1/2 p-4 bg-slate-50 border rounded-2xl outline-none">
                        <input type="text" id="p-category" placeholder="Category" class="w-1/2 p-4 bg-slate-50 border rounded-2xl outline-none">
                    </div>
                    <input type="text" id="p-sizes" placeholder="Sizes (e.g. S, M, L)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                    
                    <label class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-3xl cursor-pointer bg-slate-50">
                        <div id="upload-placeholder" class="text-center">
                            <i class="fa-solid fa-camera text-3xl text-slate-300 mb-2"></i>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Tap to Snap Product Photo</p>
                        </div>
                        <img id="image-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                        <input type="file" id="p-image" accept="image/*" capture="environment" class="hidden" onchange="previewFile(event)">
                    </label>
                    <button onclick="saveProduct()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">Create Product</button>
                </div>
            </section>
            <h3 class="font-bold text-slate-400 text-xs uppercase px-2">Inventory Management</h3>
            <div id="admin-inventory" class="space-y-3"></div>
        </div>

        <div id="view-store" class="hidden space-y-4 animate-pop">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="store-search" oninput="handleSearch()" placeholder="Search Moms World..." class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="filter-bar"></div>
            <h2 class="text-lg font-black text-slate-800 px-1">Collections</h2>
            <div id="store-grid" class="grid grid-cols-2 gap-4"></div>
        </div>
    </main>

    <div id="cart-drawer" class="fixed bottom-24 left-4 right-4 bg-slate-900 text-white p-5 rounded-
