<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Store Builder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24 text-slate-800">

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-indigo-600 tracking-tighter italic">SNAP.SHOP</h1>
            <div id="status-badge" class="flex items-center gap-1.5 text-[10px] font-bold uppercase bg-green-100 text-green-700 px-2 py-1 rounded-full transition-all">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Online
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="flex bg-slate-200 p-1 rounded-xl">
            <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm transition-all">Merchant Panel</button>
            <button onclick="switchTab('store')" id="tab-store" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 transition-all">Customer View</button>
        </div>

        <div id="view-admin" class="space-y-6">
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-circle-plus text-indigo-500"></i> Add New Product
                </h2>
                <div class="space-y-3">
                    <input type="text" id="p-name" placeholder="Product Name" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    
                    <div class="flex gap-2">
                        <input type="number" id="p-price" placeholder="Price ($)" class="w-1/2 p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                        <select id="p-category" class="w-1/2 p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="All">Category</option>
                            <option value="🍔 Food">Food</option>
                            <option value="👕 Clothing">Clothing</option>
                            <option value="⚡ Tech">Tech</option>
                            <option value="✨ Other">Other</option>
                        </select>
                    </div>
                    
                    <label class="relative flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 overflow-hidden group">
                        <div id="upload-placeholder" class="flex flex-col items-center">
                            <i class="fa-solid fa-camera text-3xl text-slate-300 group-hover:text-indigo-400 transition-colors"></i>
                            <p class="text-xs text-slate-400 mt-2">Snap Photo to Publish</p>
                        </div>
                        <img id="image-preview" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                        <input type="file" id="p-image" accept="image/*" capture="environment" class="hidden" onchange="previewFile(event)">
                    </label>

                    <button onclick="saveProduct()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                        Publish Instantly
                    </button>
                </div>
            </section>

            <section class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Items</p>
                    <p class="text-2xl font-black text-slate-800" id="stat-count">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Store Hits</p>
                    <p class="text-2xl font-black text-indigo-600" id="stat-views">0</p>
                </div>
            </section>
        </div>

        <div id="view-store" class="hidden space-y-4 animate-in">
            <div class="flex gap-2 overflow-x-auto no-scrollbar py-2" id="filter-bar">
                <button onclick="filterProducts('All')" class="filter-btn active-filter px-5 py-2 rounded-full bg-indigo-600 text-white text-xs font-bold whitespace-nowrap shadow-md">All</button>
                <button onclick="filterProducts('🍔 Food')" class="filter-btn px-5 py-2 rounded-full bg-white border text-slate-500 text-xs font-bold whitespace-nowrap">Food</button>
                <button onclick="filterProducts('👕 Clothing')" class="filter-btn px-5 py-2 rounded-full bg-white border text-slate-500 text-xs font-bold whitespace-nowrap">Clothing</button>
                <button onclick="filterProducts('⚡ Tech')" class="filter-btn px-5 py-2 rounded-full bg-white border text-slate-500 text-xs font-bold whitespace-nowrap">Tech</button>
            </div>

            <div id="store-grid" class="grid grid-cols-2 gap-4">
                </div>
        </div>

    </main>

    <div id="qr-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-6">
        <div class="bg-white w-full rounded-3xl p-8 text-center animate-in">
            <h2 class="text-xl font-bold mb-1">Store QR Code</h2>
            <p class="text-slate-500 text-sm mb-6">Scan to open the store</p>
            <div id="qrcode" class="flex justify-center mb-8 p-3 bg-white border-4 border-slate-50 rounded-2xl inline-block shadow-inner"></div>
            <button onclick="toggleQR()" class="w-full py-3 text-slate-500 font-bold border rounded-xl mb-3">Close</button>
            <button onclick="window.print()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Print for Shop</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t border-slate-200 p-4">
        <div class="max-w-md mx-auto flex justify-around items-center">
            <button onclick="switchTab('admin')" class="flex flex-col items-center gap-1 text-indigo-600">
                <i class="fa-solid fa-house-chimney text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Panel</span>
            </button>
            <button onclick="toggleQR()" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fa-solid fa-qrcode text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">QR Link</span>
            </button>
            <button onclick="copyLink()" class="flex flex-col items-center gap-1 text-slate-400">
                <i class="fa-solid fa-share-nodes text-lg"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">Share</span>
            </button>
        </div>
    </nav>

    <script>
        // --- 1. DB SETUP ---
        const db = new Dexie("ProStoreDB");
        db.version(1).stores({ products: "++id, name, price, category, image, views" });

        // --- 2. CAMERA & PREVIEW ---
        function previewFile(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('image-preview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('upload-placeholder').classList.add('hidden');
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        // --- 3. SAVE PRODUCT ---
        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const category = document.getElementById('p-category').value;
            const image = document.getElementById('image-preview').src;

            if(!name || !price || image.includes('window.location')) {
                alert("Please add a name, price, and photo!");
                return;
            }

            await db.products.add({ name, price, category, image, views: 0 });
            
            // Reset
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('upload-placeholder').classList.remove('hidden');
            
            alert("Published Successfully!");
            loadProducts();
            updateStats();
        }

        // --- 4. DISPLAY LOGIC ---
        async function loadProducts(filter = 'All') {
            let products = await db.products.toArray();
            if (filter !== 'All') products = products.filter(p => p.category === filter);
            
            const grid = document.getElementById('store-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-in">
                    <img src="${p.image}" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <span class="text-[8px] font-bold text-indigo-500 uppercase">${p.category}</span>
                        <h3 class="font-bold text-sm truncate text-slate-700">${p.name}</h3>
                        <p class="text-indigo-600 font-black mb-2">$${p.price}</p>
                        <button onclick="orderWA('${p.name}', '${p.price}')" class="w-full bg-green-500 text-white py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">
                            <i class="fa-brands fa-whatsapp mr-1"></i> Order
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function orderWA(name, price) {
            const phone = "1234567890"; // MERCHANT NUMBER
            const msg = encodeURIComponent(`Hello! I want to order: ${name} ($${price}). Is it available?`);
            window.open(`https://wa.me/${phone}?text=${msg}`);
        }

        // --- 5. UI CONTROLS ---
        function switchTab(tab) {
            const isAdmin = tab === 'admin';
            document.getElementById('view-admin').classList.toggle('hidden', !isAdmin);
            document.getElementById('view-store').classList.toggle('hidden', isAdmin);
            
            document.getElementById('tab-admin').className = isAdmin ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500";
            document.getElementById('tab-store').className = !isAdmin ? "flex-1 py-2 text-sm font-bold rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500";
            
            if(!isAdmin) loadProducts();
        }

        function filterProducts(cat) {
            loadProducts(cat);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn px-5 py-2 rounded-full bg-white border text-slate-500 text-xs font-bold whitespace-nowrap";
                if(btn.innerText.includes(cat.split(' ')[1] || 'All')) {
                    btn.className = "filter-btn active-filter px-5 py-2 rounded-full bg-indigo-600 text-white text-xs font-bold whitespace-nowrap shadow-md";
                }
            });
        }

        async function updateStats() {
            const count = await db.products.count();
            document.getElementById('stat-count').innerText = count;
            document.getElementById('stat-views').innerText = Math.floor(Math.random() * 50) + count;
        }

        let qrCreated = false;
        function toggleQR() {
            const modal = document.getElementById('qr-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
            if(!qrCreated) {
                new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 200, height: 200 });
                qrCreated = true;
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            alert("Store link copied to clipboard!");
        }

        // --- 6. OFFLINE STATUS ---
        window.addEventListener('online', () => updateStatus(true));
        window.addEventListener('offline', () => updateStatus(false));
        function updateStatus(online) {
            const badge = document.getElementById('status-badge');
            badge.className = online ? "flex items-center gap-1.5 text-[10px] font-bold uppercase bg-green-100 text-green-700 px-2 py-1 rounded-full transition-all" : "flex items-center gap-1.5 text-[10px] font-bold uppercase bg-red-100 text-red-700 px-2 py-1 rounded-full transition-all";
            badge.innerHTML = online ? '<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Online' : '<span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> Offline Mode';
        }

        loadProducts();
        updateStats();
    </script>
</body>
</html>
