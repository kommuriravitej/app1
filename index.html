<main class="max-w-md mx-auto p-4 space-y-6">
    
    <section id="admin-login" class="hidden animate-pop">
        <div class="bg-white p-8 rounded-[3rem] border shadow-xl text-center space-y-6">
            <div class="w-16 h-16 bg-pink-50 rounded-full flex items-center justify-center mx-auto">
                <i class="fa-solid fa-lock moms-pink text-2xl"></i>
            </div>
            <h2 class="text-xl font-black text-slate-800">Admin Access</h2>
            <input type="password" id="admin-pin" maxlength="4" placeholder="••••" class="w-32 text-center text-2xl font-black tracking-[1rem] p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-pink-400">
            <button onclick="checkPin()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Verify PIN</button>
        </div>
    </section>

    <section id="store-bio" class="hidden animate-pop">
        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm text-center">
            <h2 class="text-lg font-black text-slate-800 mb-1 font-serif italic">Welcome to Moms World ✨</h2>
            <p class="text-[11px] text-slate-500 italic px-4">Premium essentials for you and your little ones. 💖</p>
        </div>
    </section>

    <div id="tab-container" class="flex bg-slate-200 p-1 rounded-2xl">
        <button onclick="switchTab('admin')" id="tab-admin" class="flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm transition-all text-slate-900">Inventory</button>
        <button onclick="switchTab('store')" id="tab-store" class="flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500 transition-all">Store View</button>
    </div>

    <div id="view-admin" class="hidden space-y-6">
        
        <section class="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100 shadow-sm animate-pop">
            <h2 class="text-sm font-bold mb-2 flex items-center gap-2 text-indigo-900 uppercase tracking-tighter">
                <i class="fa-solid fa-layer-group text-indigo-600"></i> Bulk Add Stock
            </h2>
            <p class="text-[9px] text-indigo-400 mb-3 font-bold uppercase">Format: Name, Price, Category, Sizes</p>
            <textarea id="bulk-input" rows="3" placeholder="Frock, 25, Baby, S/M&#10;Dress, 30, Kids, 12M" 
                class="w-full p-4 bg-white border border-indigo-200 rounded-2xl outline-none text-xs font-mono mb-3 focus:ring-2 focus:ring-indigo-400 no-scrollbar"></textarea>
            <button onclick="processBulk()" id="btn-bulk" class="w-full bg-indigo-600 text-white font-black py-3 rounded-2xl uppercase tracking-widest text-[10px] active:scale-95 transition-all">Upload Bulk List</button>
        </section>

        <div class="space-y-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="admin-search" oninput="refreshUI()" placeholder="Find item to edit/delete..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl outline-none text-xs">
            </div>
            <div id="admin-inventory" class="space-y-3"></div>
        </div>

        <section class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm mt-8">
            <h2 class="text-sm font-bold mb-4 flex items-center gap-2 italic uppercase"><i class="fa-solid fa-plus-circle moms-pink"></i> Add Individual Item</h2>
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="Product Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <div class="flex gap-3">
                    <input type="number" id="p-price" placeholder="Price" class="w-1/2 p-4 bg-slate-50 border rounded-2xl outline-none">
                    <input type="text" id="p-category" placeholder="Category" class="w-1/2 p-4 bg-slate-50 border rounded-2xl outline-none">
                </div>
                <input type="text" id="p-sizes" placeholder="Sizes (e.g. S, M, L)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <label class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100">
                    <i class="fa-solid fa-camera text-xl text-slate-300 mb-1"></i>
                    <span class="text-[9px] font-bold uppercase text-slate-400">Add Photo</span>
                    <input type="file" id="p-img" accept="image/*" class="hidden" onchange="previewFile(event)">
                </label>
                <div id="preview-container" class="hidden relative h-40 rounded-2xl overflow-hidden border">
                    <img id="image-preview" src="" class="w-full h-full object-cover">
                    <button onclick="removePreview()" class="absolute top-2 right-2 bg-white/90 p-2 rounded-full text-red-500 shadow-sm"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <button onclick="uploadProduct()" id="btn-publish" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest text-xs active:scale-95 transition-all">Publish to Cloud</button>
            </div>
        </section>
    </div>

    <div id="view-store" class="hidden space-y-4 animate-pop">
        <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="store-search" oninput="handleSearch()" placeholder="Search Moms World..." class="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none shadow-sm">
        </div>
        <div class="flex gap-2 overflow-x-auto no-scrollbar py-1" id="filter-bar"></div>
        <div id="store-grid" class="grid grid-cols-2 gap-4"></div>
    </div>
</main>

<script>
    // --- SUPABASE SETUP ---
    const SUPABASE_URL = 'https://kqgeojqdmyuejteqtczu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_HaDa8rT3A4_l2E9DhzpGwQ_wJYDBNzO'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const MASTER_PIN = '9490'; 
    let isAdminAuthenticated = false;
    let products = [];
    let cart = [];
    let currentFilter = 'All';
    let selectedFile = null;

    window.onload = () => {
        fetchProducts();
        const params = new URLSearchParams(window.location.search);
        if (params.get('view') === 'store') {
            document.getElementById('tab-container').style.display = 'none';
            document.getElementById('nav-admin').style.display = 'none';
            switchTab('store');
        } else {
            switchTab('admin');
        }
    };

    function checkPin() {
        if (document.getElementById('admin-pin').value === MASTER_PIN) {
            isAdminAuthenticated = true;
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
        } else {
            alert("Incorrect PIN");
            document.getElementById('admin-pin').value = '';
        }
    }

    async function fetchProducts() {
        const { data, error } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
        if (!error) { products = data; refreshUI(); }
    }

    // BULK PROCESSING LOGIC
    async function processBulk() {
        const input = document.getElementById('bulk-input').value.trim();
        const btn = document.getElementById('btn-bulk');
        if (!input) return alert("Enter list first!");

        btn.innerText = "UPLOADING...";
        btn.disabled = true;

        const lines = input.split('\n');
        const toUpload = lines.map(line => {
            const p = line.split(',');
            return {
                name: p[0]?.trim(),
                price: parseFloat(p[1]?.trim()) || 0,
                category: (p[2] || "Stock").trim(),
                sizes: (p[3] || "").trim(),
                image_url: 'https://ui-avatars.com/api/?name=New+Item&background=e91e63&color=fff'
            };
        }).filter(item => item.name);

        const { error } = await supabaseClient.from('products').insert(toUpload);
        if (error) alert("Error: " + error.message);
        else {
            alert(`Added ${toUpload.length} items!`);
            document.getElementById('bulk-input').value = '';
            fetchProducts();
        }
        btn.innerText = "UPLOAD BULK LIST";
        btn.disabled = false;
    }

    // SINGLE UPLOAD LOGIC
    async function uploadProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-category').value;
        const sizes = document.getElementById('p-sizes').value;
        const btn = document.getElementById('btn-publish');

        if (!name || !price || !selectedFile) return alert("Fill all details & add photo!");
        btn.innerText = "PUBLISHING..."; btn.disabled = true;

        const fileName = `${Date.now()}-${selectedFile.name.replace(/\s/g, '_')}`;
        const { error: uploadError } = await supabaseClient.storage.from('product-images').upload(fileName, selectedFile);
        if (uploadError) { alert("Photo Upload Failed!"); btn.disabled = false; return; }

        const { data: { publicUrl } } = supabaseClient.storage.from('product-images').getPublicUrl(fileName);
        await supabaseClient.from('products').insert([{ name, price: parseFloat(price), category: cat, sizes, image_url: publicUrl }]);
        location.reload();
    }

    function previewFile(e) {
        selectedFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('image-preview').src = f.target.result;
            document.getElementById('preview-container').classList.remove('hidden');
        };
        reader.readAsDataURL(selectedFile);
    }

    function removePreview() { selectedFile = null; document.getElementById('preview-container').classList.add('hidden'); }

    async function deleteProduct(id) {
        if (confirm("Permanently delete this item?")) {
            await supabaseClient.from('products').delete().eq('id', id);
            fetchProducts();
        }
    }

    function refreshUI() {
        const query = document.getElementById('admin-search')?.value.toLowerCase() || "";
        const adminFiltered = products.filter(p => p.name.toLowerCase().includes(query));
        
        document.getElementById('admin-inventory').innerHTML = adminFiltered.map(p => `
            <div class="bg-white p-3 rounded-2xl flex items-center gap-4 border shadow-sm">
                <img src="${p.image_url}" class="w-10 h-10 rounded-xl object-cover border">
                <div class="flex-1 min-w-0">
                    <h4 class="font-bold text-[10px] uppercase truncate text-slate-800">${p.name}</h4>
                    <p class="text-[9px] moms-pink font-black">$${p.price} | ${p.category}</p>
                </div>
                <button onclick="deleteProduct('${p.id}')" class="p-2.5 bg-slate-50 text-red-400 rounded-lg hover:bg-red-50"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
            </div>`).join('');

        const storeFiltered = products.filter(p => (currentFilter === 'All' || p.category === currentFilter) && p.name.toLowerCase().includes(document.getElementById('store-search')?.value.toLowerCase() || ""));
        renderStore(storeFiltered);
        renderFilters(products);
    }

    function renderFilters(list) {
        const cats = [...new Set(list.map(p => p.category))];
        document.getElementById('filter-bar').innerHTML = `<button onclick="currentFilter='All'; refreshUI()" class="px-5 py-2 rounded-full ${currentFilter === 'All' ? 'bg-slate-900 text-white' : 'bg-white border text-slate-400'} text-[9px] font-black uppercase">All</button>` + 
            cats.map(cat => `<button onclick="currentFilter='${cat}'; refreshUI()" class="px-5 py-2 rounded-full ${currentFilter === cat ? 'bg-slate-900 text-white' : 'bg-white border text-slate-400'} text-[9px] font-black uppercase">${cat}</button>`).join('');
    }

    function renderStore(list) {
        document.getElementById('store-grid').innerHTML = list.map(p => `
            <div class="bg-white rounded-[2rem] border overflow-hidden relative shadow-sm animate-pop">
                <img src="${p.image_url}" class="w-full h-36 object-cover">
                <div class="p-4 text-center">
                    <h3 class="font-black text-[9px] uppercase tracking-tighter mb-1 text-slate-700 truncate">${p.name}</h3>
                    <p class="moms-pink font-black text-xs mb-3 font-serif">$${p.price}</p>
                    <button onclick="addToBag('${p.id}')" class="w-full bg-slate-900 text-white py-2.5 rounded-2xl text-[8px] font-black uppercase tracking-widest shadow-md">Add to bag</button>
                </div>
            </div>`).join('');
    }

    function switchTab(t) {
        const isAd = t === 'admin';
        document.getElementById('admin-login').classList.toggle('hidden', !isAd || isAdminAuthenticated);
        document.getElementById('view-admin').classList.toggle('hidden', !isAd || !isAdminAuthenticated);
        document.getElementById('view-store').classList.toggle('hidden', isAd);
        document.getElementById('store-bio').classList.toggle('hidden', isAd);
        document.getElementById('tab-admin').className = isAd ? "flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm" : "flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500";
        document.getElementById('tab-store').className = !isAd ? "flex-1 py-2.5 text-sm font-bold rounded-xl bg-white shadow-sm" : "flex-1 py-2.5 text-sm font-bold rounded-xl text-slate-500";
    }

    function addToBag(id) {
        const p = products.find(i => i.id === id);
        cart.push(p); updateCartUI();
    }

    function updateCartUI() {
        const dr = document.getElementById('cart-drawer');
        if(cart.length === 0) { dr.classList.add('hidden'); return; }
        dr.classList.remove('hidden');
        let total = cart.reduce((s, i) => s + parseFloat(i.price), 0);
        document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `<div class="flex justify-between text-[10px] text-white"><span>${i.name}</span><button onclick="cart.splice(${idx},1); updateCartUI()" class="text-pink-500">Remove</button></div>`).join('');
        document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    }
</script>
